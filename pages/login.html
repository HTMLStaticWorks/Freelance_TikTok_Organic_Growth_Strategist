<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ViralPro Studio</title>
  <meta name="description" content="Login to your ViralPro Studio account to access your dashboard, content calendar, and growth reports." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    body {
      background: var(--clr-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card {
      background: var(--clr-card);
      border: 1px solid var(--clr-card-border);
      border-radius: var(--border-radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(20px);
    }
    .auth-logo-link {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      text-decoration: none;
      transition: var(--transition);
    }
    .auth-logo-link:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--clr-text);
    }
    .auth-header p {
      color: var(--clr-text-muted);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--clr-text-2);
    }
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--clr-bg-2);
      border: 1.5px solid var(--clr-card-border);
      border-radius: var(--border-radius);
      color: var(--clr-text);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--clr-primary);
      background: var(--clr-card);
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.1);
    }
    .pw-wrap {
      position: relative;
    }
    .pw-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--clr-text-muted);
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .pw-toggle:hover {
      color: var(--clr-primary);
    }
    .auth-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--clr-text-muted);
      transition: color 0.2s;
    }
    .remember-me:hover {
      color: var(--clr-text);
    }
    .forgot-link {
      color: var(--clr-primary);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .forgot-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    .social-auth {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--clr-card);
      border: 1px solid var(--clr-card-border);
      border-radius: var(--border-radius);
      color: var(--clr-text);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .social-btn:hover {
      border-color: var(--clr-primary);
      background: var(--clr-bg-2);
      transform: translateY(-2px);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      color: var(--clr-text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--clr-card-border);
    }
    .divider span {
      padding: 0 1rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--clr-text-muted);
    }
    .auth-footer a {
      color: var(--clr-primary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 0.25rem;
      transition: opacity 0.2s;
    }
    .auth-footer a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    /* Checkbox styling */
    input[type="checkbox"] {
      accent-color: var(--clr-primary);
      width: 1.1rem;
      height: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="../index.html" class="auth-logo-link">
      <div class="nav-logo">
        <div class="logo-icon">V</div>
        <span>ViralPro<span style="color:var(--clr-primary);">Studio</span></span>
      </div>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome back 👋</h1>
        <p>Sign in to continue your growth journey</p>
      </div>

      <div class="social-auth">
        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>

      <div class="divider"><span>OR CONTINUE WITH EMAIL</span></div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPw" class="form-input" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" onclick="togglePw('loginPw')">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="justify-content:center; padding: 0.875rem;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account?<a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    }
  </script>
</body>
</html>
