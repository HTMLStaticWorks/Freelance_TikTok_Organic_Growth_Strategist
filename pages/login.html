<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ViralPro</title>
  <meta name="description" content="Login to your ViralPro account to access your dashboard, content calendar, and growth reports." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff2d55'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='60' font-weight='bold' fill='white'>V</text></svg>">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    body {
      background: var(--clr-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-actions {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
    }
    .auth-icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-card);
      border: 1px solid var(--clr-card-border);
      border-radius: 10px;
      color: var(--clr-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-icon-btn:hover {
      background: var(--clr-bg-2);
      border-color: var(--clr-primary);
      color: var(--clr-primary);
    }
    .auth-card {
      background: var(--clr-card);
      border: 1px solid var(--clr-card-border);
      border-radius: var(--border-radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(20px);
    }
    .auth-logo-link {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      text-decoration: none;
      transition: var(--transition);
    }
    .auth-logo-link:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--clr-text);
    }
    .auth-header p {
      color: var(--clr-text-muted);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--clr-text-2);
    }
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--clr-bg-2);
      border: 1.5px solid var(--clr-card-border);
      border-radius: var(--border-radius);
      color: var(--clr-text);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--clr-primary);
      background: var(--clr-card);
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.1);
    }
    .pw-wrap {
      position: relative;
    }
    .pw-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--clr-text-muted);
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .pw-toggle:hover {
      color: var(--clr-primary);
    }
    .auth-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--clr-text-muted);
      transition: color 0.2s;
    }
    .remember-me:hover {
      color: var(--clr-text);
    }
    .forgot-link {
      color: var(--clr-primary);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .forgot-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    .social-auth {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: var(--clr-card);
      border: 1px solid var(--clr-card-border);
      border-radius: 14px;
      color: var(--clr-text);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
    .social-btn:hover {
      border-color: var(--clr-primary);
      background: var(--clr-bg-2);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 45, 85, 0.15);
    }
    .social-btn svg {
      width: 24px;
      height: 24px;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      color: var(--clr-text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--clr-card-border);
    }
    .divider span {
      padding: 0 1rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--clr-text-muted);
    }
    .auth-footer a {
      color: var(--clr-primary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 0.25rem;
      transition: opacity 0.2s;
    }
    .auth-footer a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    /* Checkbox styling */
    input[type="checkbox"] {
      accent-color: var(--clr-primary);
      width: 1.1rem;
      height: 1.1rem;
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-actions">
    <button class="auth-icon-btn theme-toggle" title="Toggle theme">
      <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="theme-icon-sun" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="auth-icon-btn rtl-toggle" title="Toggle RTL">
      <svg class="rtl-icon-default" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" /></svg>
      <svg class="rtl-icon-active" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 6H4M20 12H4M20 18H4" /></svg>
    </button>
  </div>
  <div class="auth-container">
    <a href="../index.html" class="auth-logo-link">
      <div class="nav-logo">
        <div class="logo-icon">V</div>
        <span>ViralPro</span>
      </div>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome back 👋</h1>
        <p>Sign in to continue your growth journey</p>
      </div>

      <div class="social-auth">
        <button class="social-btn" title="Sign in with Google">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 3.053 29.262 1 24 1C11.297 1 1 11.297 1 24s10.297 23 23 23s23-10.297 23-23c0-1.334-.114-2.641-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 3.053 29.262 1 24 1C16.318 1 9.656 4.758 5.508 10.528l.798 4.163z"/><path fill="#4CAF50" d="M24 47c6.262 0 11.835-2.479 16.071-6.522l-6.101-5.186C31.332 37.332 27.87 39 24 39c-5.965 0-11.034-3.894-12.82-9.336l-7.246 5.592C7.79 40.912 15.352 47 24 47z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.101 5.186C40.665 35.651 47 30.294 47 24c0-1.334-.114-2.641-.389-3.917z"/></svg>
        </button>
        <button class="social-btn" title="Sign in with Apple">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        </button>
      </div>

      <div class="divider"><span>OR CONTINUE WITH EMAIL</span></div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPw" class="form-input" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" onclick="togglePw('loginPw')">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="justify-content:center; padding: 0.875rem;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account?<a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    }

    // Theme & RTL Toggles
    const body = document.body;
    const themeBtn = document.querySelector('.theme-toggle');
    const rtlBtn = document.querySelector('.rtl-toggle');

    themeBtn.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      themeBtn.querySelector('.theme-icon-moon').style.display = newTheme === 'dark' ? 'none' : 'block';
      themeBtn.querySelector('.theme-icon-sun').style.display = newTheme === 'dark' ? 'block' : 'none';
    });

    rtlBtn.addEventListener('click', () => {
      const currentDir = document.documentElement.getAttribute('dir');
      const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
      document.documentElement.setAttribute('dir', newDir);
      rtlBtn.querySelector('.rtl-icon-default').style.display = newDir === 'rtl' ? 'none' : 'block';
      rtlBtn.querySelector('.rtl-icon-active').style.display = newDir === 'rtl' ? 'block' : 'none';
    });
  </script>
</body>
</html>
